<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DJ NASH | Demandes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="client">
  <div class="bg-orbs"></div>
  <header class="topbar">
    <div class="brand"><span>DJ</span> NASH</div>
    <nav><a class="active" href="index.html">Client</a><a href="dj.html">DJ</a><a href="admin.html">Admin</a></nav>
  </header>
  <main class="wrap">
    <section class="hero card glow-card">
      <div class="pill live"><i></i> EN DIRECT</div>
      <h1 id="liveDj">DJ 6PaC</h1>
      <h2 id="liveEvent">Soirée au Nash</h2>
      <p>Scanne, écris ta demande, et le DJ la reçoit.</p>
    </section>
    <section class="card form-card">
      <h2>Envoie ta demande</h2>
      <form id="requestForm">
        <label>Ton nom<input id="clientName" placeholder="Ex: Steve" required></label>
        <label>Type de message<select id="requestType"><option>Demande spéciale</option><option>Anniversaire</option><option>Dédicace</option><option>Message au DJ</option></select></label>
        <label>Table / section <input id="tableNumber" placeholder="Ex: Table 7, bar, piste" ></label>
        <label>Message / chanson<textarea id="message" placeholder="Ex: Pitbull - Fireball pour la table 7" required></textarea></label>
        <button class="btn primary" type="submit">Envoyer au DJ</button>
      </form>
      <p id="status" class="status"></p>
        <button id="enableClientSound" class="btn ghost" type="button">Activer la sonnerie quand ma demande joue</button>
    </section>
    <section class="card">
      <h2>Suivi de mes demandes</h2>
      <p class="hint">Garde cette page ouverte. Quand le DJ marque ta demande comme jouée, une alerte lumineuse apparaît ici.</p>
      <div id="clientRequests" class="requests"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
