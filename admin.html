<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ NASH | Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <div class="brand"><span>DJ</span> NASH</div>
  <nav>
    <a href="index.html">Client</a>
    <a href="dj.html">DJ</a>
    <a class="active" href="admin.html">Admin</a>
  </nav>
</header>

<main class="wrap">
  <section id="adminLoginBox" class="card">
    <h1>Admin Steve</h1>
    <input id="adminPass" type="password" placeholder="Mot de passe admin" />
    <button onclick="adminLogin()">Entrer</button>
    <p id="adminMsg" class="status"></p>
  </section>

  <section id="adminPanel" class="hidden">
    <section class="card">
      <h2>Soirée en cours</h2>
      <label>DJ en direct</label>
      <select id="liveDjSelect"></select>
      <label>Nom de la soirée</label>
      <input id="eventInput" placeholder="Ex: Summer Glow" />
      <label>Description courte</label>
      <input id="descInput" placeholder="Ex: Demandes, anniversaires et dédicaces" />
      <label>Affiche de la soirée</label>
      <input id="posterInput" placeholder="Lien image de l'affiche" />
      <button onclick="saveLiveSettings()">Mettre en direct</button>
    </section>

    <section class="card">
      <h2>Créer un DJ</h2>
      <input id="newDjName" placeholder="Nom DJ, ex: DJ MIKILELE" />
      <input id="newDjUser" placeholder="Identifiant, ex: mikilele" />
      <input id="newDjPass" placeholder="Mot de passe" />
      <input id="newDjPhoto" placeholder="Photo URL optionnelle" />
      <button onclick="createDj()">Créer DJ</button>
    </section>

    <section class="card">
      <h2>DJs</h2>
      <button onclick="loadDjs()">Rafraîchir DJs</button>
      <div id="djList"></div>
    </section>
  </section>
</main>

<script src="app.js"></script>
<script>
  startAdminPage();
</script>
</body>
</html>
