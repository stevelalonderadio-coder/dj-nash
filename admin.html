<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DJ NASH | Panneau DJ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>
  <header class="topbar">
    <div class="brand">DJ NASH</div>
    <nav>
      <a href="./index.html">Client</a>
      <a href="./dj.html">DJ</a>
      <a href="./admin.html">Admin</a>
    </nav>
  </header>

  <main class="shell">
    <section id="loginCard" class="card glow">
      <h1>Connexion DJ</h1>
      <form id="djLogin" class="form">
        <label>DJ
          <select id="djSelect"></select>
        </label>
        <label>Mot de passe
          <input id="djPass" type="password" required placeholder="Mot de passe DJ" />
        </label>
        <button type="submit">Prendre le contrôle</button>
      </form>
      <p id="djError" class="error hidden">Mot de passe incorrect.</p>
    </section>

    <section id="djPanel" class="hidden">
      <div class="card glow">
        <div class="live-pill">● DJ CONNECTÉ</div>
        <h1 id="djPanelName"></h1>
        <p id="djPanelEvent"></p>
      </div>
      <section class="card">
        <div class="row between">
          <h2>Demandes reçues</h2>
          <button id="clearPlayed" class="secondary">Nettoyer les jouées</button>
        </div>
        <div id="requestsList" class="requests"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
  <script>DJNash.initDJ();</script>
</body>
</html>
