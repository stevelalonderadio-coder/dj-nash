<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ NASH | DJ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <div class="brand"><span>DJ</span> NASH</div>
  <nav>
    <a href="index.html">Client</a>
    <a class="active" href="dj.html">DJ</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<main class="wrap">
  <section id="loginBox" class="card">
    <h1>Connexion DJ</h1>
    <input id="djUser" placeholder="Identifiant DJ" />
    <input id="djPass" type="password" placeholder="Mot de passe" />
    <button onclick="djLogin()">Entrer</button>
    <p id="loginMsg" class="status"></p>
  </section>

  <section id="djPanel" class="hidden">
    <section class="card hero">
      <div id="profilePreview" class="avatar"></div>
      <div>
        <div class="live-dot">● PROFIL DJ</div>
        <h1 id="djNameTitle"></h1>
        <p>Ta photo sera visible partout après sauvegarde.</p>
      </div>
    </section>

    <section class="card">
      <h2>Ma photo</h2>
      <input id="photoUrl" placeholder="Lien image/photo publique" />
      <button onclick="saveDjPhoto()">Sauvegarder ma photo</button>
      <p class="hint">Astuce rapide : utilise une image hébergée en ligne. Plus tard on pourra ajouter un upload automatique.</p>
    </section>

    <section class="card">
      <h2>Demandes reçues</h2>
      <button onclick="loadRequests()">Rafraîchir</button>
      <div id="requestsList"></div>
    </section>
  </section>
</main>

<script src="app.js"></script>
<script>
  startDjPage();
</script>
</body>
</html>
