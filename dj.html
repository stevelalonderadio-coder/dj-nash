<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DJ NASH | Demandes au DJ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>
  <header class="topbar">
    <div class="brand">DJ NASH</div>
    <nav>
      <a href="./index.html">Client</a>
      <a href="./dj.html">DJ</a>
      <a href="./admin.html">Admin</a>
    </nav>
  </header>

  <main class="shell client-shell">
    <section class="hero card glow">
      <div class="live-pill">● EN DIRECT</div>
      <h1 id="publicDj">DJ 6PaC</h1>
      <h2 id="publicEvent">Soirée au Nash</h2>
      <p>Scanne, écris ta demande, et le DJ la reçoit. Simple comme un drop au bon moment.</p>
    </section>

    <section class="card">
      <h3>Envoie ta demande</h3>
      <form id="requestForm" class="form">
        <label>Ton nom
          <input id="name" required maxlength="40" placeholder="Ex: Steve" />
        </label>
        <label>Type de message
          <select id="type">
            <option>Demande spéciale</option>
            <option>Anniversaire</option>
            <option>Dédicace</option>
            <option>Message au DJ</option>
          </select>
        </label>
        <label>Message / chanson
          <textarea id="message" required maxlength="180" placeholder="Ex: Pitbull - Fireball pour la table 4"></textarea>
        </label>
        <button type="submit">Envoyer au DJ</button>
      </form>
      <p id="sentMsg" class="success hidden">Demande envoyée au DJ ✅</p>
    </section>
  </main>

  <script src="app.js"></script>
  <script>DJNash.initPublic();</script>
</body>
</html>
